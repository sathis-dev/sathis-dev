<svg width="100%" viewBox="0 0 830 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050d1a"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>

    <pattern id="grid" width="35" height="35" patternUnits="userSpaceOnUse">
      <path d="M 35 0 L 0 0 0 35" fill="none" stroke="#6EE7B710" stroke-width="0.5"/>
    </pattern>

    <!-- Subtle glow — much lighter than before -->
    <filter id="subtleGlow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="iconGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <clipPath id="mainClip">
      <rect width="830" height="280" rx="8"/>
    </clipPath>
  </defs>

  <g clip-path="url(#mainClip)">
    <!-- Background -->
    <rect width="830" height="280" fill="url(#bgGrad)"/>
    <rect width="830" height="280" fill="url(#grid)"/>

    <!-- Very subtle ambient glow -->
    <ellipse cx="415" cy="140" rx="280" ry="100" fill="#6EE7B7" opacity="0.02"/>

    <!-- Horizontal scan line -->
    <rect x="0" width="830" height="1" fill="#6EE7B7" opacity="0.08">
      <animate attributeName="y" from="-2" to="282" dur="5s" repeatCount="indefinite"/>
    </rect>

    <!-- Corner brackets — thinner, cleaner -->
    <polyline points="0,40 0,0 40,0" fill="none" stroke="#6EE7B7" stroke-width="1.5" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.3;0.6" dur="3s" repeatCount="indefinite"/>
    </polyline>
    <polyline points="790,0 830,0 830,40" fill="none" stroke="#6EE7B7" stroke-width="1.5" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.3;0.6" dur="3s" begin="0.5s" repeatCount="indefinite"/>
    </polyline>
    <polyline points="0,240 0,280 40,280" fill="none" stroke="#6EE7B7" stroke-width="1.5" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.3;0.6" dur="3s" begin="1s" repeatCount="indefinite"/>
    </polyline>
    <polyline points="790,280 830,280 830,240" fill="none" stroke="#6EE7B7" stroke-width="1.5" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.3;0.6" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    </polyline>

    <!-- Top label -->
    <text x="48" y="13" font-family="'Courier New', monospace" font-size="8.5" fill="#6EE7B7" opacity="0.25" letter-spacing="2">SATHIS_HETTIARACHCHI.profile</text>
    <!-- Bottom label -->
    <text x="48" y="273" font-family="'Courier New', monospace" font-size="8.5" fill="#6EE7B7" opacity="0.25" letter-spacing="2">Cambridge, UK • Open to work</text>

    <!-- Left code block — dimmer -->
    <text x="24" y="52" font-family="'Courier New', monospace" font-size="9.5" fill="#6EE7B7" opacity="0.15">const dev = {</text>
    <text x="24" y="66" font-family="'Courier New', monospace" font-size="9.5" fill="#818CF8" opacity="0.13">  stack: <tspan fill="#FBBF24" opacity="0.4">"Next.js | React | TS"</tspan>,</text>
    <text x="24" y="80" font-family="'Courier New', monospace" font-size="9.5" fill="#818CF8" opacity="0.13">  role:  <tspan fill="#FBBF24" opacity="0.4">"Full-Stack Dev"</tspan>,</text>
    <text x="24" y="94" font-family="'Courier New', monospace" font-size="9.5" fill="#818CF8" opacity="0.13">  open:  <tspan fill="#6EE7B7" opacity="0.5">true</tspan>,</text>
    <text x="24" y="108" font-family="'Courier New', monospace" font-size="9.5" fill="#6EE7B7" opacity="0.15">};</text>

    <!-- Right code block — dimmer -->
    <text x="640" y="52" font-family="'Courier New', monospace" font-size="9.5" fill="#6EE7B7" opacity="0.15">$ git log --oneline</text>
    <text x="640" y="66" font-family="'Courier New', monospace" font-size="9.5" fill="#FBBF24" opacity="0.12">a3f12bc feat: ship v3</text>
    <text x="640" y="80" font-family="'Courier New', monospace" font-size="9.5" fill="#FBBF24" opacity="0.12">9c821ef fix: edge case</text>
    <text x="640" y="94" font-family="'Courier New', monospace" font-size="9.5" fill="#FBBF24" opacity="0.12">d4e09a1 perf: optimize</text>
    <text x="640" y="108" font-family="'Courier New', monospace" font-size="9.5" fill="#FBBF24" opacity="0.12">2b71cc3 feat: auth flow</text>

    <!-- ═══ MAIN NAME — clean, crisp ═══ -->
    <text x="415" y="155"
      text-anchor="middle"
      font-family="'Segoe UI', Arial, sans-serif"
      font-size="42"
      font-weight="800"
      fill="#ffffff"
      letter-spacing="1">SATHIS HETTIARACHCHI</text>

    <!-- Underline — draws from center -->
    <line x1="415" y1="165" x2="415" y2="165" stroke="#6EE7B7" stroke-width="1.2" opacity="0.7">
      <animate attributeName="x1" from="415" to="210" dur="1s" fill="freeze" begin="0.3s"/>
      <animate attributeName="x2" from="415" to="620" dur="1s" fill="freeze" begin="0.3s"/>
    </line>

    <!-- Subtitle -->
    <text x="415" y="187"
      text-anchor="middle"
      font-family="'Courier New', monospace"
      font-size="12.5"
      fill="#6EE7B7"
      letter-spacing="3.5"
      opacity="0">
      FULL-STACK DEVELOPER · UI ARCHITECT · PROBLEM SOLVER
      <animate attributeName="opacity" values="0;0;0.75" dur="1.8s" fill="freeze"/>
    </text>

    <!-- Status pills — cleaner -->
    <rect x="205" y="205" width="110" height="20" rx="10" fill="none" stroke="#6EE7B7" stroke-width="0.7" opacity="0.7"/>
    <circle cx="218" cy="215" r="3" fill="#6EE7B7">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <text x="226" y="219" font-family="'Courier New', monospace" font-size="9.5" fill="#6EE7B7" font-weight="600">Open to Hire</text>

    <rect x="325" y="205" width="85" height="20" rx="10" fill="none" stroke="#818CF8" stroke-width="0.7" opacity="0.7"/>
    <circle cx="337" cy="215" r="2.5" fill="#818CF8"/>
    <text x="344" y="219" font-family="'Courier New', monospace" font-size="9.5" fill="#818CF8" font-weight="600">Next.js</text>

    <rect x="420" y="205" width="95" height="20" rx="10" fill="none" stroke="#38BDF8" stroke-width="0.7" opacity="0.7"/>
    <circle cx="432" cy="215" r="2.5" fill="#38BDF8"/>
    <text x="440" y="219" font-family="'Courier New', monospace" font-size="9.5" fill="#38BDF8" font-weight="600">TypeScript</text>

    <rect x="525" y="205" width="100" height="20" rx="10" fill="none" stroke="#FBBF24" stroke-width="0.7" opacity="0.7"/>
    <circle cx="537" cy="215" r="2.5" fill="#FBBF24"/>
    <text x="545" y="219" font-family="'Courier New', monospace" font-size="9.5" fill="#FBBF24" font-weight="600">Node.js</text>

    <!-- Subtle vertical lines -->
    <line x1="155" y1="0" x2="155" y2="280" stroke="#6EE7B7" stroke-width="0.3" opacity="0.06"/>
    <line x1="675" y1="0" x2="675" y2="280" stroke="#6EE7B7" stroke-width="0.3" opacity="0.06"/>

    <!-- Blinking cursor — positioned after name -->
    <rect x="665" y="140" width="3" height="20" rx="1" fill="#6EE7B7" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0;0.7" dur="1s" repeatCount="indefinite"/>
    </rect>

    <!-- Border -->
    <rect width="830" height="280" rx="8" fill="none" stroke="#6EE7B7" stroke-width="0.6" opacity="0.12"/>
  </g>
</svg>
